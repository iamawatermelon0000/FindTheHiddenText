<!DOCTYPE html>
<html>
  <head>

    <title>find the hidden text</title>

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 50px;
      }

      #inputSection {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 50px;

        position: fixed;
        bottom: 10px;
      }

      #printText {
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        font-style: italic;
        
        position: absolute;
        
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 50px;
      }

      input, button {
        width: 250px;
        height: 75px;

        font-size: 20px;
      }
    </style>

  </head>
  <body>
    
    <div id="inputSection">
      <input type="text" id="answer" placeholder="Enter the text that you found here...">
      <button id="b" type="button" onclick="sendText()">Confirm</button>
    </div>

    <div id="printText">You need to find this text! (Game starts after 5s)</div>

    <script>

      let prText = document.getElementById("printText");

      const orders = [ // shoutout to dcode.fr and others for encoding
        "sghr hr nmkx sgd adfhmmhmf...", // caesar
        "Y29uZ3JhdHMgb24gYmVhdGluZyB0aGlzIG9uZSwgYnV0IGl0J3Mgbm90IG92ZXIgeWV0Li4u", // base64
        "1101001 1101101 1110000 1110010 1100101 1110011 1110011 1101001 1110110 1100101 101110 101110 101110 100000 1100010 1110101 1110100 100000 1110100 1101000 1100001 1110100 100000 1110111 1101111 1101110 100111 1110100 100000 1100010 1100101 100000 1100101 1101110 1101111 1110101 1100111 1101000", // bin
        "-.- . . .--. / .. - / ..- .--. -..-. -..-. -..-. / -... ..- - / .. - / .-- .. .-.. .-.. / -. . ...- . .-. / -... . / . -. --- ..- --. .... -..-. -..-. -..-.", // isnt this obvious
        ",X^IL,_Y$yc.`)8j$zIxrgA", // base91
        "pmlo. cme amx... sp nmb iss?", // vigenere
        "ml... gsrh xzm'g yv....", // atbash
      ];
      const decodedOrder = [ // shoutout to dcode.fr and others for decoding
        "this is only the beginning...",
        "congrats on beating this one, but it's not over yet...",
        "impressive... but that won't be enough",
        "fine. you won... or did you?",
        "no... this can't be...."
      ];

      let o;
      let i = -1;
      let index = 0;

      const background = [
        "black",
        "white",
        "yellow",
        "blue",
        "burlywood",
        "brown",
        "grey",
        "red"
      ];
      let b;

      let x = 0, y = 0;
      let btn = document.getElementById("b");
      
      let countdown = 5;
      let iCount = setInterval(() => {
        countdown--;
        prText.textContent = `You need to find this text! (Game starts after ${countdown}s)`;

        if (countdown === 0) {
          clearInterval(iCount);
          iCount = null;
          update();
        }

      }, 1000)

      function update() {

        i++;
        o = orders[i];
        prText.textContent = o;

        orders.splice(i, 1);

        b = background[Math.floor(Math.random() * background.length)];
        document.body.style.background = b;
        prText.style.color = b;

        x = Math.floor(Math.random() * (window.innerWidth - 100)) + 1;
        y = Math.floor(Math.random() * (window.innerHeight - 50)) + 1;

        prText.style.left = x + 'px';
        prText.style.top = y + 'px';
      }

      function sendText() {

        let t = document.getElementById("answer").value;

        if (t === "/open => [developer-menu]") { // only run this after the countdown has ended
          alert(`Developer key recieved... Please check the console.`);
        
          console.warn("== Developer's Meny ==");
          console.warn(`Current ANSWER KEY: ${o}`);
          console.warn(`Current POSITION: ${x}x, ${y}y`);
          console.warn(`-- DO NOT ABUSE THIS KEY. USE THIS AS A DEBUG MENU. --`);
          console.warn(`== END ==`);

          return;
        }

        if (countdown !== 0 && t) {
          alert("Cheater!");
          btn.disabled = true;

          return;
        }

        if (countdown !== 0 || iCount) {
          alert("The game hasn't even started yet!");
          return;
        }

        if (t === null) { console.warn("text data === null"); return; }

        if (t === o) {
          alert(decodedOrder[index++]);
          update();
        } else {
          alert("You will never escape this place... (Incorrect Answer)");
        }

        document.getElementById("answer").value = "";

        if (orders.length === 0) {
            alert("you won... but i will be back soon.....");
            document.body.innerHTML = "";

            setTimeout(() => {
              window.location.replace("about:blank");
            }, 2500)
        }
      }

      document.addEventListener("keydown", e => {
        if (e.key === "Enter") sendText();
      });
      document.addEventListener("DOMContentLoaded", () => {
        console.log("You can just click the text 3 times to select it easily!");
        console.warn("content loaded");
      });
      
    </script>

  </body>
</html>
